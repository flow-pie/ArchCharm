name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find . -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning

  json-lint:
    name: JSON Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          failed=0
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "Invalid JSON: $f"
              failed=1
            fi
          done
          exit $failed

      - name: Validate JSONC files (basic syntax)
        run: |
          failed=0
          for f in $(find . -name '*.jsonc' -not -path './.git/*'); do
            stripped=$(sed 's|//.*$||g; /^[[:space:]]*$/d' "$f")
            if ! echo "$stripped" | python3 -m json.tool > /dev/null 2>&1; then
              echo "Invalid JSONC: $f"
              failed=1
            fi
          done
          exit $failed
