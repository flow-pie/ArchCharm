name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find . -name '*.sh' -print0 | xargs -0 shellcheck --severity=error

  json-lint:
    name: JSON Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          failed=0
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "Invalid JSON: $f"
              failed=1
            fi
          done
          exit $failed

      - name: Validate JSONC files (basic syntax)
        run: |
          python3 -c "
          import json, glob, sys

          def strip_jsonc_comments(text):
              result = []
              i = 0
              in_string = False
              while i < len(text):
                  if not in_string:
                      if text[i] == '/' and i + 1 < len(text):
                          if text[i + 1] == '/':
                              # line comment — skip to end of line
                              while i < len(text) and text[i] != '\n':
                                  i += 1
                              continue
                          elif text[i + 1] == '*':
                              # block comment — skip to */
                              i += 2
                              while i + 1 < len(text) and not (text[i] == '*' and text[i + 1] == '/'):
                                  i += 1
                              i += 2  # skip */
                              continue
                      if text[i] == '\"':
                          in_string = True
                  else:
                      if text[i] == '\\\\':
                          result.append(text[i])
                          i += 1
                          if i < len(text):
                              result.append(text[i])
                              i += 1
                          continue
                      if text[i] == '\"':
                          in_string = False
                  result.append(text[i])
                  i += 1
              import re
              out = ''.join(result)
              out = re.sub(r',\\s*([}\\]])', r'\\1', out)
              return out

          failed = 0
          for f in sorted(glob.glob('**/*.jsonc', recursive=True)):
              text = open(f).read()
              cleaned = strip_jsonc_comments(text)
              try:
                  json.loads(cleaned)
              except json.JSONDecodeError as e:
                  print(f'Invalid JSONC: {f} — {e}')
                  failed = 1
          sys.exit(failed)
          "
