name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a new feature, config, or improvement for ArchCharm.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why?
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New application config
        - Existing config improvement
        - Installer change
        - Theme / color scheme
        - Documentation
        - Other
    validations:
      required: true
