name: Bug Report
description: Report a bug with ArchCharm
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: input
    id: os
    attributes:
      label: Operating System
      description: "Output of `uname -a` or your distro version"
      placeholder: "e.g. Arch Linux 6.x.x-arch1-1"
    validations:
      required: true

  - type: input
    id: compositor
    attributes:
      label: Compositor Version
      description: "Output of `niri --version`"
      placeholder: "e.g. niri 25.02"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `./install.sh --all`
        2. Reboot
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages
      render: shell
    validations:
      required: false
